<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Asteroids MP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Courier New", Courier, monospace;
    }
    #game-canvas { display: block; width: 100%; height: 100%; }
    #ui-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    #hud {
      position: absolute; top: 20px; left: 20px; color: #fff;
      font-size: 14px; text-shadow: 0 0 5px #000;
    }
    #radar {
      position: absolute; bottom: 20px; right: 20px;
      border: 2px solid #444; border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      width: 180px; height: 180px;
    }
    #connection-status {
      position: absolute; top: 20px; right: 20px;
      color: #888; font-size: 12px;
    }
    #join-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: auto; z-index: 100;
    }
    #join-screen.hidden { display: none; }
    #join-screen h1 { color: #fff; font-size: 48px; margin-bottom: 30px; }
    #join-screen input {
      padding: 12px 20px; font-size: 18px; font-family: inherit;
      border: 2px solid #444; border-radius: 8px;
      background: #111; color: #fff; width: 300px; margin-bottom: 20px;
    }
    #join-screen button {
      padding: 12px 40px; font-size: 18px; font-family: inherit;
      border: none; border-radius: 8px;
      background: #0a0; color: #fff; cursor: pointer;
    }
    #join-screen button:hover { background: #0c0; }
    #join-screen .hint { color: #666; font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-layer">
    <div id="hud"></div>
    <canvas id="radar" width="180" height="180"></canvas>
    <div id="connection-status">Connecting...</div>
  </div>
  <div id="join-screen">
    <h1>ASTEROIDS MP</h1>
    <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
    <button id="join-btn">JOIN GAME</button>
    <p class="hint">WASD / Arrows to move • Space to fire</p>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // --- Constants ---
    const WORLD_SIZE = 4000
    const BASE_POSITION = { x: WORLD_SIZE / 2, y: WORLD_SIZE / 2 }
    const BASE_RADIUS = 150
    const SHIP_SIZE = 24
    const SHIP_COLLISION_RADIUS = 10
    const SHIP_MAX_SPEED = 12
    const ASTEROID_GLYPHS = '▓▒░█▀▄■●◐◑◒◓⬡⬢◆◇○●'
    const BULLET_GLYPHS = '●◉◎○'
    const PARTICLE_GLYPHS = '·•◦○●'
    const EXPLOSION_GLYPHS = '✦✧★☆✶✷✸✹✺✻✼✽'
    const BULLET_LIFETIME = 90
    const PARTICLE_LIFETIME = 25
    const PARTICLE_DECAY = 0.92

    // --- Particles ---
    const particles = []
    const BULLET_TRAIL_GLYPHS = '·•◦'
    
    function angleToVector(angle) {
      return { x: Math.cos(angle), y: Math.sin(angle) }
    }
    
    function createAfterburnerParticle(ship, intensity = 1) {
      const thrustDir = angleToVector(ship.angle)
      const baseX = ship.x - thrustDir.x * SHIP_SIZE * 0.6
      const baseY = ship.y - thrustDir.y * SHIP_SIZE * 0.6
      const spread = 0.3 * intensity
      
      // More particles at higher intensity
      const count = intensity > 0.8 ? 3 : 2
      
      const result = []
      for (let i = 0; i < count; i++) {
        result.push({
          x: baseX + (Math.random() - 0.5) * spread * 2,
          y: baseY + (Math.random() - 0.5) * spread * 2,
          vx: ship.vx - thrustDir.x * (2 + Math.random() * 3) * intensity + (Math.random() - 0.5),
          vy: ship.vy - thrustDir.y * (2 + Math.random() * 3) * intensity + (Math.random() - 0.5),
          glyph: PARTICLE_GLYPHS[Math.floor(Math.random() * PARTICLE_GLYPHS.length)],
          life: PARTICLE_LIFETIME * (0.8 + Math.random() * 0.4) * intensity,
          maxLife: PARTICLE_LIFETIME,
          size: (8 + Math.random() * 8) * intensity,
          color: `hsl(${15 + Math.random() * 25}, 100%, ${45 + Math.random() * 25}%)`,
        })
      }
      return result
    }
    
    function createBulletTrailParticle(bullet) {
      return {
        x: bullet.x + (Math.random() - 0.5) * 4,
        y: bullet.y + (Math.random() - 0.5) * 4,
        vx: bullet.vx * 0.3 + (Math.random() - 0.5),
        vy: bullet.vy * 0.3 + (Math.random() - 0.5),
        glyph: BULLET_TRAIL_GLYPHS[Math.floor(Math.random() * BULLET_TRAIL_GLYPHS.length)],
        life: 8 + Math.random() * 6,
        maxLife: 14,
        size: 6 + Math.random() * 6,
        color: `hsl(${45 + Math.random() * 15}, 100%, ${50 + Math.random() * 20}%)`,
      }
    }
    
    function createExplosionParticles(x, y, count, glyphSet) {
      const result = []
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2
        const speed = 2 + Math.random() * 6
        result.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          glyph: glyphSet[Math.floor(Math.random() * glyphSet.length)],
          life: 20 + Math.random() * 20,
          maxLife: 40,
          size: 10 + Math.random() * 10,
          color: `hsl(${Math.random() * 60}, 100%, ${50 + Math.random() * 20}%)`,
        })
      }
      return result
    }
    
    function createAsteroidHitParticles(x, y) {
      const result = []
      const count = 10 + Math.floor(Math.random() * 8)  // More particles: 10-17
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2
        const speed = 1.5 + Math.random() * 5  // Faster: 1.5-6.5
        result.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          glyph: ASTEROID_GLYPHS[Math.floor(Math.random() * ASTEROID_GLYPHS.length)],
          life: 18 + Math.random() * 18,  // Longer life: 18-36 frames
          maxLife: 36,
          size: 9 + Math.random() * 10,  // Larger: 9-19
          color: `hsl(0, 0%, ${55 + Math.random() * 25}%)`,  // Brighter: 55-80%
        })
      }
      return result
    }
    
    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]
        p.x += p.vx
        p.y += p.vy
        p.vx *= PARTICLE_DECAY
        p.vy *= PARTICLE_DECAY
        p.life--
        if (p.life <= 0) {
          particles.splice(i, 1)
        }
      }
    }
    
    function renderParticles() {
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      
      for (const p of particles) {
        const lifeRatio = p.life / p.maxLife
        ctx.globalAlpha = lifeRatio
        ctx.fillStyle = p.color
        ctx.font = `${p.size}px "Courier New", monospace`
        ctx.fillText(p.glyph, p.x - camera.x, p.y - camera.y)
      }
      
      ctx.globalAlpha = 1
    }

    // --- Asteroid Canvas Cache ---
    const asteroidCanvasCache = new Map()
    const lastAsteroidHit = new Map() // Track hits to avoid spam

    function getAsteroidCanvas(asteroid) {
      const key = `${asteroid.size}-${asteroid.id}`
      if (asteroidCanvasCache.has(key)) return asteroidCanvasCache.get(key)

      const radius = asteroid.radius
      const dim = (radius + 2) * 2
      const canvas = document.createElement('canvas')
      canvas.width = dim
      canvas.height = dim
      const ctx = canvas.getContext('2d')

      const centerX = radius + 2
      const centerY = radius + 2
      const density = asteroid.size === 'large' ? 9 : asteroid.size === 'medium' ? 7 : 5
      const fontSize = asteroid.size === 'large' ? 13 : asteroid.size === 'medium' ? 10 : 8

      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'

      // Create a seeded random based on asteroid id for consistent but varied patterns
      const seed = asteroid.id.split('-').reduce((a, b) => a + (parseFloat(b) || 0), 0)
      const randomGlyph = (x, y) => {
        // Mix position with seed for varied but consistent patterns per asteroid
        const hash = Math.sin(seed * 1000 + x * 17 + y * 31) * 10000
        return Math.floor((hash - Math.floor(hash)) * ASTEROID_GLYPHS.length)
      }

      // Fill interior following the actual polygon shape (not circular)
      for (let y = -radius + density; y < radius; y += density) {
        for (let x = -radius + density; x < radius; x += density) {
          // Check if point is inside the polygon
          if (pointInPolygon({ x, y }, asteroid.vertices)) {
            const glyphIndex = randomGlyph(x, y)
            const glyph = ASTEROID_GLYPHS[glyphIndex]
            const shadeIndex = ASTEROID_GLYPHS.indexOf(glyph)
            const lightness = 35 + ((shadeIndex >= 0 ? shadeIndex : 0) % 9) * 5
            ctx.globalAlpha = 0.75
            ctx.fillStyle = `hsl(0, 0%, ${lightness}%)`
            ctx.font = `bold ${fontSize}px "Courier New", monospace`
            ctx.fillText(glyph, centerX + x, centerY + y)
          }
        }
      }

      ctx.globalAlpha = 1
      asteroidCanvasCache.set(key, canvas)
      return canvas
    }

    // Point in polygon test for interior fill
    function pointInPolygon(point, vertices) {
      let inside = false
      for (let i = 0, j = vertices.length - 1; i < vertices.length; j = i++) {
        const xi = vertices[i].x, yi = vertices[i].y
        const xj = vertices[j].x, yj = vertices[j].y
        const intersects = ((yi > point.y) !== (yj > point.y)) &&
          (point.x < (xj - xi) * (point.y - yi) / (yj - yi) + xi)
        if (intersects) inside = !inside
      }
      return inside
    }

    // --- Socket.io Connection ---
    const socket = io()
    let playerId = null

    const connectionStatus = document.getElementById('connection-status')
    
    socket.on('connect', () => {
      console.log('[+] Connected to server')
      connectionStatus.textContent = 'Connected'
      connectionStatus.style.color = '#0a0'
    })
    
    socket.on('disconnect', () => {
      console.log('[-] Disconnected from server')
      connectionStatus.textContent = 'Disconnected'
      connectionStatus.style.color = '#a00'
    })

    // --- Game State ---
    const localShip = { id: '', name: '', x: 0, y: 0, vx: 0, vy: 0, angle: 0, alive: true, score: 0, deaths: 0, kills: 0, prevX: 0, prevY: 0, collectedLetters: [] }
    const remoteShips = new Map()
    const asteroids = []
    const bullets = []
    const letterDrops = []
    const depositedLetters = []  // Letters floating at base
    let gameActive = false
    let timeRemaining = 0
    let leaderboard = []

    // --- Input ---
    const input = { thrust: false, left: false, right: false, fire: false, teleport: false }
    let inputSeq = 0
    let fireHeld = false
    const keysDown = new Set()

    // --- Canvas Setup ---
    const canvas = document.getElementById('game-canvas')
    const ctx = canvas.getContext('2d')
    const radarCanvas = document.getElementById('radar')
    const radarCtx = radarCanvas.getContext('2d')
    const hud = document.getElementById('hud')

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1
      canvas.width = window.innerWidth * dpr
      canvas.height = window.innerHeight * dpr
      ctx.scale(dpr, dpr)
    }
    resizeCanvas()
    window.addEventListener('resize', resizeCanvas)

    // --- Camera ---
    const camera = { x: 0, y: 0 }
    function updateCamera() {
      // Directly center camera on ship - no clamping at all
      camera.x = localShip.x - window.innerWidth / 2
      camera.y = localShip.y - window.innerHeight / 2
    }

    // --- Input Handling ---
    let fireCooldown = 0
    
    // Reset input when window loses focus (tab switching)
    window.addEventListener('blur', () => {
      keysDown.clear()
      input.thrust = false
      input.left = false
      input.right = false
      input.fire = false
      input.teleport = false
      fireHeld = false
      fireCooldown = 0
    })
    
    document.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault()
      keysDown.add(e.code)
      input.thrust = keysDown.has('ArrowUp') || keysDown.has('KeyW')
      input.left = keysDown.has('ArrowLeft') || keysDown.has('KeyA')
      input.right = keysDown.has('ArrowRight') || keysDown.has('KeyD')
      if (e.code === 'Space') {
        fireHeld = true
      }
    })
    document.addEventListener('keyup', (e) => {
      keysDown.delete(e.code)
      input.thrust = keysDown.has('ArrowUp') || keysDown.has('KeyW')
      input.left = keysDown.has('ArrowLeft') || keysDown.has('KeyA')
      input.right = keysDown.has('ArrowRight') || keysDown.has('KeyD')
      if (e.code === 'Space') {
        fireHeld = false
        input.fire = false
      }
    })

    // --- Join UI ---
    const joinScreen = document.getElementById('join-screen')
    const joinBtn = document.getElementById('join-btn')
    const nameInput = document.getElementById('player-name')
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinBtn.click() })
    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim() || 'Player'
      socket.emit('join', { name })
      joinScreen.classList.add('hidden')
    })
    nameInput.focus()

    // --- Socket.io Event Handlers ---
    socket.on('welcome', (data) => {
      playerId = data.playerId
      localShip.id = playerId
      localShip.name = 'You'
      console.log('[*] Welcome! Player ID:', playerId)
    })

    socket.on('state', (data) => {
      const serverShip = data.ships.find(s => s.id === playerId)
      if (serverShip) {
        // Detect large position jumps (respawn or wrap)
        const jumpX = Math.abs(serverShip.x - localShip.x)
        const jumpY = Math.abs(serverShip.y - localShip.y)
        
        // Reset wrap tracking on large jumps (respawn)
        if (jumpX > 500 || jumpY > 500) {
          lastShipX = serverShip.x
          lastShipY = serverShip.y
          wrapOffsetX = 0
          wrapOffsetY = 0
        }
        
        localShip.prevX = localShip.x; localShip.prevY = localShip.y
        localShip.x = serverShip.x; localShip.y = serverShip.y
        localShip.vx = serverShip.vx; localShip.vy = serverShip.vy
        localShip.angle = serverShip.angle; localShip.alive = serverShip.alive
        localShip.score = serverShip.score; localShip.deaths = serverShip.deaths; localShip.kills = serverShip.kills
        // Update collected letters for trail rendering
        if (serverShip.collectedLetters) {
          localShip.collectedLetters = [...serverShip.collectedLetters]
        }
      }

      remoteShips.clear()
      for (const ship of data.ships) {
        if (ship.id !== playerId) remoteShips.set(ship.id, ship)
      }

      asteroids.length = 0
      asteroids.push(...data.asteroids)
      bullets.length = 0
      bullets.push(...data.bullets)
      
      // Update letter drops
      if (data.letterDrops) {
        letterDrops.length = 0
        letterDrops.push(...data.letterDrops)
      }
      
      // Update deposited letters at base
      if (data.depositedLetters) {
        depositedLetters.length = 0
        depositedLetters.push(...data.depositedLetters)
      }
      
      // Debug: log bullet info
      if (bullets.length > 0 && Math.random() < 0.1) {
        console.log('[STATE] Bullets received:', bullets.length, 'First bullet:', bullets[0])
      }

      gameActive = data.gameActive
      timeRemaining = data.timeRemaining
    })

    socket.on('event', (event) => {
      console.log('[EVENT]', event.type, event)
      if (event.type === 'game-end' && event.leaderboard) leaderboard = event.leaderboard
      if (event.type === 'game-start') console.log('[GAME STARTED] Duration:', event.duration)
      
      // Spawn explosion particles on player death
      if (event.type === 'player-died') {
        const deadShip = event.playerId === playerId ? localShip : remoteShips.get(event.playerId)
        if (deadShip) {
          particles.push(...createExplosionParticles(deadShip.x, deadShip.y, 30, EXPLOSION_GLYPHS))
        }
      }
      
      // Spawn hit particles on asteroid hit (from server)
      if (event.type === 'asteroid-hit') {
        console.log('[HIT EVENT] Spawning particles at', event.x.toFixed(0), event.y.toFixed(0))
        particles.push(...createAsteroidHitParticles(event.x, event.y))
      }
    })

    // --- Challenge State ---
    let currentChallenge = null
    let challengeTimerInterval = null
    
    // Socket handlers for challenges
    socket.on('challenge-start', (data) => {
      console.log('[CHALLENGE] Started:', data)
      showChallengePanel(data)
    })
    
    socket.on('challenge-active', (data) => {
      console.log('[CHALLENGE] Active:', data)
      updateChallengePanel(data)
    })
    
    socket.on('challenge-result', (data) => {
      console.log('[CHALLENGE] Result:', data)
      showChallengeResult(data)
    })
    
    // Challenge UI functions
    function showChallengePanel(data) {
      currentChallenge = data
      const panel = document.getElementById('challenge-panel')
      const category = document.getElementById('challenge-category')
      const sentence = document.getElementById('challenge-sentence')
      const hint = document.getElementById('challenge-hint')
      const input = document.getElementById('challenge-input')
      const streak = document.getElementById('challenge-streak')
      
      category.textContent = data.category
      sentence.textContent = data.sentence.text.replace('_____', '_____')
      hint.textContent = 'Hint: ' + data.sentence.hint
      input.value = ''
      streak.textContent = ''
      
      panel.classList.remove('hidden')
      input.focus()
      
      // Start timer
      if (challengeTimerInterval) clearInterval(challengeTimerInterval)
      challengeTimerInterval = setInterval(() => {
        const timer = document.getElementById('challenge-timer')
        if (currentChallenge) {
          const elapsed = Math.floor((Date.now() - currentChallenge.startTime) / 1000)
          timer.textContent = elapsed + 's'
        }
      }, 1000)
    }
    
    function updateChallengePanel(data) {
      if (!currentChallenge) return
      currentChallenge = data
      const timer = document.getElementById('challenge-timer')
      const elapsed = Math.floor(data.timeElapsed / 1000)
      timer.textContent = elapsed + 's'
    }
    
    function showChallengeResult(data) {
      if (challengeTimerInterval) clearInterval(challengeTimerInterval)
      
      const panel = document.getElementById('challenge-panel')
      const streak = document.getElementById('challenge-streak')
      
      streak.textContent = data.correct 
        ? `✓ Correct! +${data.points} points (Streak: ${data.streak})`
        : `✗ Wrong! The answer was: ${data.correctAnswer}`
      streak.style.color = data.correct ? '#0f0' : '#f00'
      
      // Auto-hide after 2 seconds
      setTimeout(() => {
        panel.classList.add('hidden')
        currentChallenge = null
      }, 2000)
    }
    
    function submitChallenge() {
      if (!currentChallenge) return
      const input = document.getElementById('challenge-input')
      const answer = input.value.trim()
      if (answer) {
        socket.emit('challenge-answer', { answer })
      }
    }
    
    // Challenge UI event handlers (run after DOM is ready)
    setTimeout(() => {
      const submitBtn = document.getElementById('challenge-submit')
      const input = document.getElementById('challenge-input')
      const hintBtn = document.getElementById('challenge-hint-btn')
      
      if (submitBtn) submitBtn.addEventListener('click', submitChallenge)
      if (input) input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitChallenge()
      })
      if (hintBtn) hintBtn.addEventListener('click', () => {
        const hint = document.getElementById('challenge-hint')
        if (hint) hint.style.display = 'block'
      })
    }, 100)

    // --- Send Input (60 TPS) ---
    setInterval(() => {
      if (!playerId) return
      
      // Auto-fire when space is held (with cooldown)
      if (fireHeld && fireCooldown <= 0) {
        input.fire = true
        fireCooldown = 8 // Match server fire rate
      } else if (fireCooldown > 0) {
        fireCooldown--
        input.fire = false
      }
      
      socket.emit('input', {
        seq: inputSeq++,
        thrust: input.thrust,
        left: input.left,
        right: input.right,
        fire: input.fire,
        teleport: input.teleport,
      })
      input.fire = false
      input.teleport = false
    }, 1000 / 60)

    // --- Rendering ---
    function renderAsteroid(asteroid) {
      const screenX = asteroid.x - camera.x, screenY = asteroid.y - camera.y
      if (screenX < -100 || screenX > window.innerWidth + 100 || screenY < -100 || screenY > window.innerHeight + 100) return

      ctx.save()
      ctx.translate(screenX, screenY)
      ctx.rotate(asteroid.rotation)
      
      const canvas = getAsteroidCanvas(asteroid)
      const dim = canvas.width / (window.devicePixelRatio || 1)
      const offset = dim / 2
      ctx.drawImage(canvas, -offset, -offset)

      ctx.restore()
    }

    // Get the screen position of an object, wrapped to nearest visible position
    function getWrappedScreenPos(worldX, worldY) {
      let screenX = worldX - camera.x
      let screenY = worldY - camera.y
      
      // Wrap to nearest visible position
      while (screenX < -WORLD_SIZE / 2) screenX += WORLD_SIZE
      while (screenX > WORLD_SIZE / 2) screenX -= WORLD_SIZE
      while (screenY < -WORLD_SIZE / 2) screenY += WORLD_SIZE
      while (screenY > WORLD_SIZE / 2) screenY -= WORLD_SIZE
      
      return { x: screenX, y: screenY }
    }

    // Render asteroid with seamless world wrapping
    function renderAsteroidWrapped(asteroid) {
      const pos = getWrappedScreenPos(asteroid.x, asteroid.y)
      
      // Cull if off screen
      if (pos.x < -100 || pos.x > window.innerWidth + 100 || pos.y < -100 || pos.y > window.innerHeight + 100) return

      ctx.save()
      ctx.translate(pos.x, pos.y)
      ctx.rotate(asteroid.rotation)
      
      const canvas = getAsteroidCanvas(asteroid)
      const dim = canvas.width / (window.devicePixelRatio || 1)
      const offset = dim / 2
      ctx.drawImage(canvas, -offset, -offset)

      ctx.restore()
    }

    // Render ship with seamless world wrapping
    function renderShipWrapped(ship, isLocal) {
      if (!ship.alive) return
      
      const pos = getWrappedScreenPos(ship.x, ship.y)
      
      // Cull if off screen
      if (pos.x < -50 || pos.x > window.innerWidth + 50 || pos.y < -50 || pos.y > window.innerHeight + 50) return

      ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(ship.angle + Math.PI / 2)
      ctx.fillStyle = isLocal ? '#fff' : '#f66'
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'

      const glyphs = ['▲', '◢', '◣']
      const positions = [
        { x: 0, y: -SHIP_SIZE / 2, size: 22 },
        { x: -SHIP_SIZE / 3, y: SHIP_SIZE / 3, size: 14, angle: -0.3 },
        { x: SHIP_SIZE / 3, y: SHIP_SIZE / 3, size: 14, angle: 0.3 },
      ]

      for (let i = 0; i < positions.length; i++) {
        const pos = positions[i]
        ctx.save(); ctx.translate(pos.x, pos.y)
        if (pos.angle) ctx.rotate(pos.angle)
        ctx.font = `bold ${pos.size}px "Courier New", monospace`
        ctx.fillText(glyphs[i], 0, 0)
        ctx.restore()
      }

      ctx.restore()

      ctx.fillStyle = isLocal ? '#0f0' : '#ff0'
      ctx.font = '12px "Courier New", monospace'
      ctx.textAlign = 'center'
      ctx.fillText(ship.name || 'Player', pos.x, pos.y - 35)
      
      // Render letter trail behind ship (only for local player)
      if (isLocal && ship.collectedLetters && ship.collectedLetters.length > 0) {
        renderLetterTrail(ship, pos)
      }
    }

    // Letter trail - simple path following with fixed slots
    const letterTrailState = {
      positions: [],  // {x, y, vx, vy} for each letter
      shipPath: [],   // Ship position history
    }
    
    function updateLetterTrail(ship, shipPos) {
      // Record ship path
      letterTrailState.shipPath.push({ x: shipPos.x, y: shipPos.y })
      if (letterTrailState.shipPath.length > 100) {
        letterTrailState.shipPath.shift()
      }
      
      const numLetters = ship.collectedLetters?.length || 0
      
      // Initialize or resize trail
      while (letterTrailState.positions.length < numLetters) {
        const i = letterTrailState.positions.length
        // Spawn letter behind ship along path
        const pathIndex = Math.max(0, letterTrailState.shipPath.length - 1 - i * 6)
        const pathPos = letterTrailState.shipPath[pathIndex] || shipPos
        letterTrailState.positions.push({
          x: pathPos.x + (Math.random() - 0.5) * 10,
          y: pathPos.y + (Math.random() - 0.5) * 10,
          vx: ship.vx,
          vy: ship.vy,
        })
      }
      while (letterTrailState.positions.length > numLetters) {
        letterTrailState.positions.pop()
      }
      
      // Update each letter
      for (let i = 0; i < letterTrailState.positions.length; i++) {
        const letter = letterTrailState.positions[i]
        
        // Target: position on ship's path (each letter has its own "slot")
        const pathIndex = Math.max(0, letterTrailState.shipPath.length - 1 - i * 6)
        const target = letterTrailState.shipPath[pathIndex] || shipPos
        
        // Simple lerp toward target slot (smooth, no overshoot)
        const lerpFactor = 0.06
        letter.x += (target.x - letter.x) * lerpFactor
        letter.y += (target.y - letter.y) * lerpFactor
        
        // Add slight velocity from ship movement
        letter.vx = ship.vx * 0.3
        letter.vy = ship.vy * 0.3
        
        // Very gentle separation (prevent exact overlap)
        for (let j = 0; j < letterTrailState.positions.length; j++) {
          if (i === j) continue
          const other = letterTrailState.positions[j]
          const dx = letter.x - other.x
          const dy = letter.y - other.y
          const dist = Math.hypot(dx, dy)
          if (dist < 12 && dist > 0) {
            const push = (12 - dist) * 0.01
            letter.x += dx * push
            letter.y += dy * push
          }
        }
      }
    }

    function renderLetterTrail(ship, shipPos) {
      if (!ship.collectedLetters || ship.collectedLetters.length === 0) return
      
      // Update physics first
      updateLetterTrail(ship, shipPos)
      
      // Draw subtle connecting lines
      ctx.strokeStyle = 'rgba(0, 255, 200, 0.15)'
      ctx.lineWidth = 1
      ctx.beginPath()
      ctx.moveTo(shipPos.x, shipPos.y)
      for (const pos of letterTrailState.positions) {
        ctx.lineTo(pos.x, pos.y)
      }
      ctx.stroke()
      
      // Draw letters
      for (let i = 0; i < letterTrailState.positions.length; i++) {
        const pos = letterTrailState.positions[i]
        const letter = ship.collectedLetters[i]
        const alpha = 1 - (i / letterTrailState.positions.length) * 0.5
        const hue = (letter.charCodeAt(0) * 17) % 360
        
        ctx.globalAlpha = alpha
        ctx.fillStyle = `hsl(${hue}, 80%, 60%)`
        ctx.font = 'bold 18px "Courier New", monospace'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.shadowColor = `hsl(${hue}, 80%, 50%)`
        ctx.shadowBlur = 8
        
        // Slight tilt based on ship velocity
        const angle = Math.atan2(ship.vy, ship.vx) + Math.PI / 2
        ctx.save()
        ctx.translate(pos.x, pos.y)
        ctx.rotate(angle * 0.15)
        ctx.fillText(letter, 0, 0)
        ctx.restore()
      }
      ctx.shadowBlur = 0
      ctx.globalAlpha = 1
    }

    // Cache for base gradient (expensive to create every frame)
    let baseGradient = null
    
    function renderBase() {
      const pos = getWrappedScreenPos(BASE_POSITION.x, BASE_POSITION.y)
      
      // Cull if off screen
      if (pos.x < -BASE_RADIUS || pos.x > window.innerWidth + BASE_RADIUS ||
          pos.y < -BASE_RADIUS || pos.y > window.innerHeight + BASE_RADIUS) return
      
      // Create gradient once
      if (!baseGradient) {
        const tempCanvas = document.createElement('canvas')
        tempCanvas.width = BASE_RADIUS * 2
        tempCanvas.height = BASE_RADIUS * 2
        const tempCtx = tempCanvas.getContext('2d')
        const grad = tempCtx.createRadialGradient(
          BASE_RADIUS, BASE_RADIUS, BASE_RADIUS * 0.5,
          BASE_RADIUS, BASE_RADIUS, BASE_RADIUS
        )
        grad.addColorStop(0, 'rgba(0, 255, 100, 0.15)')
        grad.addColorStop(1, 'rgba(0, 255, 100, 0)')
        baseGradient = grad
      }
      
      ctx.save()
      ctx.translate(pos.x, pos.y)
      
      // Outer glow (cached gradient)
      ctx.fillStyle = baseGradient
      ctx.beginPath()
      ctx.arc(0, 0, BASE_RADIUS, 0, Math.PI * 2)
      ctx.fill()
      
      // Inner ring (simplified - no dash pattern which is expensive)
      ctx.strokeStyle = 'rgba(0, 255, 136, 0.6)'
      ctx.lineWidth = 2
      ctx.beginPath()
      ctx.arc(0, 0, BASE_RADIUS * 0.7, 0, Math.PI * 2)
      ctx.stroke()
      
      ctx.restore()
    }

    // Render bullet with seamless world wrapping
    function renderBulletWrapped(bullet) {
      const pos = getWrappedScreenPos(bullet.x, bullet.y)

      // Cull if off screen
      if (pos.x < 0 || pos.x > window.innerWidth || pos.y < 0 || pos.y > window.innerHeight) return

      // Cycling glyph for bullet
      const glyphIndex = Math.floor((BULLET_LIFETIME - bullet.life) / 15) % BULLET_GLYPHS.length
      const glyph = BULLET_GLYPHS[glyphIndex] || '●'

      // Color shifts from yellow to orange as bullet ages
      const hue = 50 + bullet.life * 2
      ctx.fillStyle = `hsl(${hue}, 100%, 55%)`
      ctx.font = 'bold 16px "Courier New", monospace'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'

      // Glow effect
      ctx.shadowColor = `hsl(${hue}, 100%, 50%)`
      ctx.shadowBlur = 8
      ctx.fillText(glyph, pos.x, pos.y)
      ctx.shadowBlur = 0
    }

    function renderLetterDrop(drop) {
      const pos = getWrappedScreenPos(drop.x, drop.y)
      
      // Cull if off screen
      if (pos.x < 0 || pos.x > window.innerWidth || pos.y < 0 || pos.y > window.innerHeight) return

      // Fade out near end of life
      const lifeRatio = drop.life / 600
      if (lifeRatio < 0.3) {
        ctx.globalAlpha = lifeRatio / 0.3
      }

      // Color based on letter (vibrant, readable)
      const hue = (drop.letter.charCodeAt(0) * 17) % 360
      ctx.fillStyle = `hsl(${hue}, 80%, 60%)`
      ctx.font = 'bold 20px "Courier New", monospace'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      
      // Glow for visibility
      ctx.shadowColor = `hsl(${hue}, 80%, 50%)`
      ctx.shadowBlur = 10
      
      // Rotate letter
      ctx.save()
      ctx.translate(pos.x, pos.y)
      ctx.rotate(drop.rotation || 0)
      ctx.fillText(drop.letter, 0, 0)
      ctx.restore()
      
      ctx.shadowBlur = 0
      ctx.globalAlpha = 1
    }

    function renderDepositedLetters() {
      // Render letters at base (static spiral display, no camera wrap)
      for (const drop of depositedLetters) {
        // Calculate screen position relative to base (not camera-wrapped)
        const screenX = drop.x - camera.x
        const screenY = drop.y - camera.y
        
        // Cull if off screen
        if (screenX < -50 || screenX > window.innerWidth + 50 || screenY < -50 || screenY > window.innerHeight + 50) continue

        // Fade out near end of life (permanent now)
        const lifeRatio = drop.life / 999999
        if (lifeRatio < 0.2) {
          ctx.globalAlpha = lifeRatio / 0.2
        } else {
          ctx.globalAlpha = 0.8
        }

        // Color based on letter (vibrant, readable)
        const hue = (drop.letter.charCodeAt(0) * 17) % 360
        ctx.fillStyle = `hsl(${hue}, 80%, 60%)`
        ctx.font = 'bold 18px "Courier New", monospace'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        
        // Glow for visibility
        ctx.shadowColor = `hsl(${hue}, 80%, 50%)`
        ctx.shadowBlur = 8
        
        // Slight floating motion
        const floatOffset = Math.sin(Date.now() * 0.003 + drop.life) * 4
        
        // Rotate letter based on deposited angle
        ctx.save()
        ctx.translate(screenX, screenY + floatOffset)
        ctx.rotate((drop.angle || 0) + Math.PI / 2)  // Angle from spiral + upright
        ctx.fillText(drop.letter, 0, 0)
        ctx.restore()
      }
      ctx.shadowBlur = 0
      ctx.globalAlpha = 1
    }

    function renderRadar() {
      const size = 180, centerX = size / 2, centerY = size / 2
      const scale = size / WORLD_SIZE  // Full world view
      
      radarCtx.clearRect(0, 0, size, size)

      // Dark background circle
      radarCtx.fillStyle = 'rgba(0, 0, 0, 0.85)'
      radarCtx.beginPath()
      radarCtx.arc(centerX, centerY, size / 2, 0, Math.PI * 2)
      radarCtx.fill()
      radarCtx.strokeStyle = '#444'
      radarCtx.lineWidth = 2
      radarCtx.stroke()

      // Asteroids (gray dots) - wrapped to nearest position
      radarCtx.fillStyle = '#888'
      for (const asteroid of asteroids) {
        const pos = getWrappedScreenPos(asteroid.x, asteroid.y)
        const x = centerX + pos.x * scale
        const y = centerY + pos.y * scale
        // Only draw if within radar bounds
        if (x < 0 || x > size || y < 0 || y > size) continue
        const dotSize = asteroid.size === 'large' ? 2.5 : asteroid.size === 'medium' ? 2 : 1.5
        radarCtx.beginPath()
        radarCtx.arc(x, y, dotSize, 0, Math.PI * 2)
        radarCtx.fill()
      }

      // Remote ships (red triangles) - wrapped to nearest position
      for (const ship of remoteShips.values()) {
        if (!ship.alive) continue
        const pos = getWrappedScreenPos(ship.x, ship.y)
        const x = centerX + pos.x * scale
        const y = centerY + pos.y * scale
        if (x < 0 || x > size || y < 0 || y > size) continue
        // Draw ship pointing in its actual direction
        radarCtx.save()
        radarCtx.translate(x, y)
        radarCtx.rotate(ship.angle)
        radarCtx.fillStyle = '#f44'
        radarCtx.beginPath()
        radarCtx.moveTo(0, -4)
        radarCtx.lineTo(-3, 3)
        radarCtx.lineTo(3, 3)
        radarCtx.closePath()
        radarCtx.fill()
        radarCtx.restore()
      }

      // Local ship (green triangle) - centered, pointing in ship's direction
      if (localShip.alive && playerId) {
        radarCtx.save()
        radarCtx.translate(centerX, centerY)
        // Match the main render: angle + PI/2 because ▲ points up by default
        radarCtx.rotate(localShip.angle + Math.PI / 2)
        radarCtx.fillStyle = '#4f4'
        radarCtx.beginPath()
        radarCtx.moveTo(0, -5)
        radarCtx.lineTo(-4, 4)
        radarCtx.lineTo(4, 4)
        radarCtx.closePath()
        radarCtx.fill()
        radarCtx.restore()
      }
      
      // Home base (green circle at center of world) - position relative to player
      const baseRelX = BASE_POSITION.x - localShip.x
      const baseRelY = BASE_POSITION.y - localShip.y
      const baseX = centerX + baseRelX * scale
      const baseY = centerY + baseRelY * scale
      // Always show base on radar (it's a fixed point of reference)
      radarCtx.fillStyle = 'rgba(0, 255, 136, 0.3)'
      radarCtx.beginPath()
      radarCtx.arc(baseX, baseY, 8, 0, Math.PI * 2)  // Fixed size on radar
      radarCtx.fill()
      radarCtx.strokeStyle = '#0f8'
      radarCtx.lineWidth = 1
      radarCtx.beginPath()
      radarCtx.arc(baseX, baseY, 6, 0, Math.PI * 2)
      radarCtx.stroke()
    }

    function renderHUD() {
      const minutes = Math.floor(timeRemaining / 60000)
      const seconds = Math.floor((timeRemaining % 60000) / 1000)
      const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`
      
      hud.innerHTML = `
        <div style="color: ${gameActive ? '#0f0' : '#f00'}; font-weight: bold;">${gameActive ? '● LIVE' : '○ WAITING'}</div>
        <div style="margin: 8px 0;">TIME: ${timeStr}</div>
        <div>SCORE: ${localShip.score.toString().padStart(6, '0')}</div>
        <div>KILLS: ${localShip.kills}</div>
        <div>DEATHS: ${localShip.deaths}</div>
        <div style="margin-top: 10px; color: #888;">Players: ${remoteShips.size + (playerId ? 1 : 0)}</div>
        ${leaderboard.length > 0 ? `
          <div style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
            <div style="color: #ff0; margin-bottom: 5px;">LEADERBOARD</div>
            ${leaderboard.slice(0, 5).map((p, i) => `<div style="font-size: 12px;">${i + 1}. ${p.name}: ${p.score} (${p.kills}K/${p.deaths}D)</div>`).join('')}
          </div>
        ` : ''}
      `
    }

    // --- Main Loop ---
    let lastTime = performance.now()
    function gameLoop(currentTime) {
      const dt = currentTime - lastTime
      lastTime = currentTime

      ctx.fillStyle = '#000'
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight)

      if (playerId && localShip.alive) {
        updateCamera()

        // Add thruster particles when thrusting (more at full thrust)
        if (input.thrust && localShip.alive) {
          const speed = Math.hypot(localShip.vx, localShip.vy)
          const intensity = Math.min(1, speed / SHIP_MAX_SPEED)
          const thrustParticles = createAfterburnerParticle(localShip, 0.7 + intensity * 0.5)
          particles.push(...thrustParticles)
        }
      }

      // Add bullet trail particles
      for (const bullet of bullets) {
        particles.push(createBulletTrailParticle(bullet))
      }


      // Update and render particles
      updateParticles()

      for (const asteroid of asteroids) renderAsteroidWrapped(asteroid)
      for (const bullet of bullets) renderBulletWrapped(bullet)
      for (const ship of remoteShips.values()) renderShipWrapped(ship, false)
      if (playerId) renderShipWrapped(localShip, true)
      
      // Render letter drops
      for (const drop of letterDrops) renderLetterDrop(drop)
      
      // Render deposited letters at base (floating)
      renderDepositedLetters()
      
      // Render base
      renderBase()

      // Render particles on top
      renderParticles()

      renderRadar()
      renderHUD()

      requestAnimationFrame(gameLoop)
    }
    requestAnimationFrame(gameLoop)

    console.log('🚀 Asteroids MP client starting...')
  </script>
  
  <!-- SATs Challenge UI -->
  <div id="challenge-panel" class="challenge-panel hidden">
    <div class="challenge-content">
      <div class="challenge-header">
        <h2 id="challenge-category">SATs Challenge</h2>
        <div class="challenge-timer" id="challenge-timer">0s</div>
      </div>
      <p class="challenge-sentence" id="challenge-sentence"></p>
      <div class="challenge-hint" id="challenge-hint"></div>
      <input type="text" id="challenge-input" class="challenge-input" placeholder="Type the missing word..." autocomplete="off" maxlength="20">
      <div class="challenge-buttons">
        <button id="challenge-submit" class="challenge-btn">Submit</button>
        <button id="challenge-hint-btn" class="challenge-btn secondary">Hint (-10pts)</button>
      </div>
      <div class="challenge-streak" id="challenge-streak"></div>
    </div>
  </div>
