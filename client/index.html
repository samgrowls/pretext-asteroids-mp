<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Asteroids MP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Courier New", Courier, monospace;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 14px;
      text-shadow: 0 0 5px #000;
    }
    #radar {
      position: absolute;
      bottom: 20px;
      right: 20px;
      border: 2px solid #444;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
    }
    #connection-status {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #888;
      font-size: 12px;
    }
    #join-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 100;
    }
    #join-screen.hidden {
      display: none;
    }
    #join-screen h1 {
      color: #fff;
      font-size: 48px;
      margin-bottom: 30px;
    }
    #join-screen input {
      padding: 12px 20px;
      font-size: 18px;
      font-family: inherit;
      border: 2px solid #444;
      border-radius: 8px;
      background: #111;
      color: #fff;
      width: 300px;
      margin-bottom: 20px;
    }
    #join-screen button {
      padding: 12px 40px;
      font-size: 18px;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      background: #0a0;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    #join-screen button:hover {
      background: #0c0;
    }
    #join-screen .hint {
      color: #666;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  
  <div id="ui-layer">
    <div id="hud"></div>
    <canvas id="radar" width="150" height="150"></canvas>
    <div id="connection-status">Connecting...</div>
  </div>
  
  <div id="join-screen">
    <h1>ASTEROIDS MP</h1>
    <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
    <button id="join-btn">JOIN GAME</button>
    <p class="hint">WASD / Arrows to move • Space to fire</p>
  </div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
