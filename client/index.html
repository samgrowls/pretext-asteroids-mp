<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Asteroids MP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Courier New", Courier, monospace;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 14px;
      text-shadow: 0 0 5px #000;
    }
    #radar {
      position: absolute;
      bottom: 20px;
      right: 20px;
      border: 2px solid #444;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
    }
    #connection-status {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #888;
      font-size: 12px;
    }
    #join-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 100;
    }
    #join-screen.hidden {
      display: none;
    }
    #join-screen h1 {
      color: #fff;
      font-size: 48px;
      margin-bottom: 30px;
    }
    #join-screen input {
      padding: 12px 20px;
      font-size: 18px;
      font-family: inherit;
      border: 2px solid #444;
      border-radius: 8px;
      background: #111;
      color: #fff;
      width: 300px;
      margin-bottom: 20px;
    }
    #join-screen button {
      padding: 12px 40px;
      font-size: 18px;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      background: #0a0;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    #join-screen button:hover {
      background: #0c0;
    }
    #join-screen .hint {
      color: #666;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  
  <div id="ui-layer">
    <div id="hud"></div>
    <canvas id="radar" width="150" height="150"></canvas>
    <div id="connection-status">Connecting...</div>
  </div>
  
  <div id="join-screen">
    <h1>ASTEROIDS MP</h1>
    <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
    <button id="join-btn">JOIN GAME</button>
    <p class="hint">WASD / Arrows to move • Space to fire</p>
  </div>

  <script type="module">
    // Inline the game code - uses esm.sh for reliable browser ES modules
    import geckos from 'https://esm.sh/@geckos.io/client@3.1.0'

    const WORLD_SIZE = 4000
    const SHIP_SIZE = 24
    const SHIP_COLLISION_RADIUS = 10

    // Connection - use port 3001 for WebRTC data channels
    const connection = geckos({ port: 3001 })
    let playerId = null
    
    const connectionStatus = document.getElementById('connection-status')
    
    connection.onConnect(() => {
      console.log('[+] Connected')
      connectionStatus.textContent = 'Connected'
      connectionStatus.style.color = '#0a0'
    })
    
    connection.onDisconnect(() => {
      console.log('[-] Disconnected')
      connectionStatus.textContent = 'Disconnected'
      connectionStatus.style.color = '#a00'
    })
    
    // Game state
    const localShip = { id: '', name: '', x: 0, y: 0, vx: 0, vy: 0, angle: 0, alive: true, score: 0, deaths: 0, kills: 0, prevX: 0, prevY: 0 }
    const remoteShips = new Map()
    const asteroids = []
    const bullets = []
    let gameActive = false
    let timeRemaining = 0
    let leaderboard = []
    
    // Input
    const input = { thrust: false, left: false, right: false, fire: false, teleport: false }
    let inputSeq = 0
    let fireHeld = false
    const keysDown = new Set()
    
    // Canvas
    const canvas = document.getElementById('game-canvas')
    const ctx = canvas.getContext('2d')
    const radarCanvas = document.getElementById('radar')
    const radarCtx = radarCanvas.getContext('2d')
    const hud = document.getElementById('hud')
    
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1
      canvas.width = window.innerWidth * dpr
      canvas.height = window.innerHeight * dpr
      ctx.scale(dpr, dpr)
    }
    resizeCanvas()
    window.addEventListener('resize', resizeCanvas)
    
    // Camera
    const camera = { x: 0, y: 0 }
    function updateCamera(dt) {
      camera.x += (localShip.x - camera.x) * 0.1
      camera.y += (localShip.y - camera.y) * 0.1
      camera.x = Math.max(0, Math.min(WORLD_SIZE - window.innerWidth, camera.x))
      camera.y = Math.max(0, Math.min(WORLD_SIZE - window.innerHeight, camera.y))
    }
    
    // Input handling
    document.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault()
      keysDown.add(e.code)
      input.thrust = keysDown.has('ArrowUp') || keysDown.has('KeyW')
      input.left = keysDown.has('ArrowLeft') || keysDown.has('KeyA')
      input.right = keysDown.has('ArrowRight') || keysDown.has('KeyD')
      if (e.code === 'Space' && !fireHeld) { input.fire = true; fireHeld = true }
    })
    document.addEventListener('keyup', (e) => {
      keysDown.delete(e.code)
      input.thrust = keysDown.has('ArrowUp') || keysDown.has('KeyW')
      input.left = keysDown.has('ArrowLeft') || keysDown.has('KeyA')
      input.right = keysDown.has('ArrowRight') || keysDown.has('KeyD')
      if (e.code === 'Space') fireHeld = false
    })
    
    // Join UI
    const joinScreen = document.getElementById('join-screen')
    const joinBtn = document.getElementById('join-btn')
    const nameInput = document.getElementById('player-name')
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinBtn.click() })
    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim() || 'Player'
      connection.emit('join', { name })
      joinScreen.classList.add('hidden')
    })
    nameInput.focus()
    
    // Network handlers
    connection.on('welcome', (data) => {
      playerId = data.playerId
      localShip.id = playerId
      localShip.name = 'You'
      console.log('[*] Welcome! Player ID:', playerId)
    })
    
    connection.on('state', (data) => {
      const serverShip = data.ships.find(s => s.id === playerId)
      if (serverShip) {
        localShip.prevX = localShip.x; localShip.prevY = localShip.y
        localShip.x = serverShip.x; localShip.y = serverShip.y
        localShip.vx = serverShip.vx; localShip.vy = serverShip.vy
        localShip.angle = serverShip.angle; localShip.alive = serverShip.alive
        localShip.score = serverShip.score; localShip.deaths = serverShip.deaths; localShip.kills = serverShip.kills
      }
      remoteShips.clear()
      for (const ship of data.ships) { if (ship.id !== playerId) remoteShips.set(ship.id, ship) }
      asteroids.length = 0; asteroids.push(...data.asteroids)
      bullets.length = 0; bullets.push(...data.bullets)
      gameActive = data.gameActive; timeRemaining = data.timeRemaining
    })
    
    connection.on('event', (event) => {
      console.log('[EVENT]', event.type, event)
      if (event.type === 'game-end' && event.leaderboard) leaderboard = event.leaderboard
    })
    
    // Send input
    setInterval(() => {
      if (!playerId) return
      connection.emit('input', { seq: inputSeq++, thrust: input.thrust, left: input.left, right: input.right, fire: input.fire, teleport: input.teleport })
      input.fire = false; input.teleport = false
    }, 1000 / 60)
    
    // Rendering
    const ASTEROID_GLYPHS = '▓▒░█▀▄■●◐◑◒◓⬡⬢◆◇○●'
    
    function renderAsteroid(asteroid) {
      const screenX = asteroid.x - camera.x, screenY = asteroid.y - camera.y
      if (screenX < -100 || screenX > window.innerWidth + 100 || screenY < -100 || screenY > window.innerHeight + 100) return
      ctx.save(); ctx.translate(screenX, screenY)
      const density = asteroid.size === 'large' ? 9 : asteroid.size === 'medium' ? 7 : 5
      const fontSize = asteroid.size === 'large' ? 13 : asteroid.size === 'medium' ? 10 : 8
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      ctx.globalAlpha = asteroid.size === 'large' ? 0.95 : asteroid.size === 'medium' ? 0.85 : 0.75
      for (const vertex of asteroid.vertices) {
        const glyph = ASTEROID_GLYPHS[Math.floor(Math.abs(vertex.x + vertex.y) % ASTEROID_GLYPHS.length)]
        const shadeIndex = ASTEROID_GLYPHS.indexOf(glyph)
        const lightness = 55 + ((shadeIndex >= 0 ? shadeIndex : 0) % 5) * 7
        ctx.fillStyle = `hsl(0, 0%, ${lightness}%)`
        ctx.font = `bold ${fontSize}px "Courier New", monospace`
        ctx.fillText(glyph, vertex.x, vertex.y)
      }
      ctx.globalAlpha = 1; ctx.restore()
    }
    
    function renderShip(ship, isLocal) {
      if (!ship.alive) return
      const screenX = ship.x - camera.x, screenY = ship.y - camera.y
      if (screenX < -50 || screenX > window.innerWidth + 50 || screenY < -50 || screenY > window.innerHeight + 50) return
      ctx.save(); ctx.translate(screenX, screenY); ctx.rotate(ship.angle + Math.PI / 2)
      ctx.fillStyle = isLocal ? '#fff' : '#66f'
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      const glyphs = ['▲', '◢', '◣']
      const positions = [
        { x: 0, y: -SHIP_SIZE / 2, size: 20 },
        { x: -SHIP_SIZE / 3, y: SHIP_SIZE / 3, size: 12, angle: -0.3 },
        { x: SHIP_SIZE / 3, y: SHIP_SIZE / 3, size: 12, angle: 0.3 },
      ]
      for (let i = 0; i < positions.length; i++) {
        const pos = positions[i]
        ctx.save(); ctx.translate(pos.x, pos.y)
        if (pos.angle) ctx.rotate(pos.angle)
        ctx.font = `bold ${pos.size}px "Courier New", monospace`
        ctx.fillText(glyphs[i], 0, 0)
        ctx.restore()
      }
      ctx.restore()
      ctx.fillStyle = isLocal ? '#0f0' : '#ff0'
      ctx.font = '12px "Courier New", monospace'
      ctx.textAlign = 'center'
      ctx.fillText(ship.name || 'Player', screenX, screenY - 30)
    }
    
    function renderBullet(bullet) {
      const screenX = bullet.x - camera.x, screenY = bullet.y - camera.y
      if (screenX < 0 || screenX > window.innerWidth || screenY < 0 || screenY > window.innerHeight) return
      ctx.fillStyle = '#ff0'
      ctx.font = 'bold 14px "Courier New", monospace'
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      ctx.fillText('●', screenX, screenY)
    }
    
    function renderRadar() {
      const size = 150, centerX = size / 2, centerY = size / 2, scale = size / WORLD_SIZE
      radarCtx.clearRect(0, 0, size, size)
      radarCtx.fillStyle = 'rgba(0, 0, 0, 0.8)'
      radarCtx.beginPath(); radarCtx.arc(centerX, centerY, size / 2, 0, Math.PI * 2); radarCtx.fill()
      radarCtx.fillStyle = '#444'
      for (const asteroid of asteroids) {
        const x = centerX + asteroid.x * scale, y = centerY + asteroid.y * scale
        radarCtx.fillRect(x - 1, y - 1, 2, 2)
      }
      for (const ship of remoteShips.values()) {
        if (!ship.alive) continue
        const x = centerX + ship.x * scale, y = centerY + ship.y * scale
        radarCtx.fillStyle = '#f00'
        radarCtx.beginPath(); radarCtx.moveTo(x, y - 3); radarCtx.lineTo(x - 2, y + 2); radarCtx.lineTo(x + 2, y + 2)
        radarCtx.closePath(); radarCtx.fill()
      }
      if (localShip.alive && playerId) {
        const x = centerX + localShip.x * scale, y = centerY + localShip.y * scale
        radarCtx.fillStyle = '#0f0'
        radarCtx.beginPath(); radarCtx.moveTo(x, y - 3); radarCtx.lineTo(x - 2, y + 2); radarCtx.lineTo(x + 2, y + 2)
        radarCtx.closePath(); radarCtx.fill()
      }
    }
    
    function renderHUD() {
      const minutes = Math.floor(timeRemaining / 60000)
      const seconds = Math.floor((timeRemaining % 60000) / 1000)
      const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`
      hud.innerHTML = `
        <div style="color: ${gameActive ? '#0f0' : '#f00'}; font-weight: bold;">${gameActive ? '● LIVE' : '○ WAITING'}</div>
        <div style="margin: 8px 0;">TIME: ${timeStr}</div>
        <div>SCORE: ${localShip.score.toString().padStart(6, '0')}</div>
        <div>KILLS: ${localShip.kills}</div>
        <div>DEATHS: ${localShip.deaths}</div>
        <div style="margin-top: 10px; color: #888;">Players: ${remoteShips.size + (playerId ? 1 : 0)}</div>
        ${leaderboard.length > 0 ? `
          <div style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
            <div style="color: #ff0; margin-bottom: 5px;">LEADERBOARD</div>
            ${leaderboard.slice(0, 5).map((p, i) => `<div style="font-size: 12px;">${i + 1}. ${p.name}: ${p.score} (${p.kills}K/${p.deaths}D)</div>`).join('')}
          </div>
        ` : ''}
      `
    }
    
    // Main loop
    let lastTime = performance.now()
    function gameLoop(currentTime) {
      const dt = currentTime - lastTime
      lastTime = currentTime
      ctx.fillStyle = '#000'
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight)
      if (playerId && localShip.alive) updateCamera(dt)
      for (const asteroid of asteroids) renderAsteroid(asteroid)
      for (const bullet of bullets) renderBullet(bullet)
      for (const ship of remoteShips.values()) renderShip(ship, false)
      if (playerId) renderShip(localShip, true)
      renderRadar()
      renderHUD()
      requestAnimationFrame(gameLoop)
    }
    requestAnimationFrame(gameLoop)
    console.log('🚀 Asteroids MP client starting...')
  </script>
</body>
</html>
